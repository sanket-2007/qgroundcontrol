name: Build Protthapan GCS Windows

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 180

    env:
      CMAKE_BUILD_PARALLEL_LEVEL: 2

    steps:
      - name: Checkout source with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Qt 6.10.1 with required modules
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.10.1"
          host: "windows"
          target: "desktop"
          arch: "win64_msvc2022_64"
          cache: "false"
          modules: "qt5compat qtcharts qtgraphs qthttpserver qtimageformats qtlocation qtmultimedia qtpositioning qtquick3d qtsensors qtserialport qtshadertools qtspeech qtwebchannel qtwebsockets"

      - name: Setup MSVC 2022
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Ninja
        shell: pwsh
        run: |
          choco install ninja -y

      - name: Verify tools and Qt modules
        shell: pwsh
        run: |
          echo "QT_ROOT_DIR=$env:QT_ROOT_DIR"
          echo "Qt6_DIR=$env:Qt6_DIR"
          where cmake
          where ninja
          where qt-cmake.bat
          where qmake
          python --version
          cmake --version
          ninja --version
          qmake --version

          echo "Checking Qt module folders..."
          dir "$env:QT_ROOT_DIR\lib\cmake" | findstr Qt6Graphs
          dir "$env:QT_ROOT_DIR\lib\cmake" | findstr Qt6Quick3D
          dir "$env:QT_ROOT_DIR\lib\cmake" | findstr Qt6ShaderTools
          dir "$env:QT_ROOT_DIR\lib\cmake" | findstr Qt6HttpServer
          dir "$env:QT_ROOT_DIR\lib\cmake" | findstr Qt6TextToSpeech

      - name: Configure CMake
        shell: pwsh
        run: |
          & "$env:QT_ROOT_DIR\bin\qt-cmake.bat" `
            -B build `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR"

      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config Release --parallel 2

      - name: Collect build output
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifact

          $exe = Get-ChildItem -Path build -Filter "QGroundControl.exe" -Recurse | Select-Object -First 1

          if ($null -eq $exe) {
            Write-Error "QGroundControl.exe not found in build folder"
            exit 1
          }

          Write-Host "Found EXE at: $($exe.FullName)"
          Copy-Item -Recurse -Force "$($exe.Directory.FullName)\*" artifact\

      - name: Upload Windows build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Protthapan-GCS-Windows
          path: artifact